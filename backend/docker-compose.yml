version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: resq-db
    environment:
      - POSTGRES_USER=resq_user
      - POSTGRES_PASSWORD=resq_pass
      - POSTGRES_DB=resq_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resq_user -d resq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: resq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: resq-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  prometheus:
    image: prom/prometheus
    container_name: resq-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: resq-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
