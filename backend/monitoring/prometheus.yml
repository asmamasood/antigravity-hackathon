global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'resq-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['resq-api-service:8000']

  - job_name: 'resq-agents'
    static_configs:
      - targets: ['resq-worker:8001']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['resq-qdrant:6333']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
